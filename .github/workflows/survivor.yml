name: install

on:
  push:

jobs:
  assign:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        imply: ["complain", "intermediate", "overtake", "convenient", "absorb"]
        homemaker: ["existence", "sensible", "maintenance", "furniture"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar fp.jar
